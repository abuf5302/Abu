<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Game</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #0a0a0a;
    font-family: 'Arial', sans-serif;
    color: #0f0;
    overflow: hidden;
    touch-action: none;
  }
  h1 {
    margin-bottom: 10px;
    font-size: clamp(20px, 5vw, 32px);
    text-shadow: 0 0 10px #0f0;
  }
  #score {
    font-size: clamp(16px, 4vw, 24px);
    margin-bottom: 10px;
  }
  #game-board {
    display: grid;
    grid-template-columns: repeat(20, 1fr);
    grid-template-rows: repeat(20, 1fr);
    gap: 1px;
    background: #111;
    border: 2px solid #0f0;
    box-shadow: 0 0 20px #0f0;
    width: 90vmin;
    height: 90vmin;
    max-width: 400px;
    max-height: 400px;
  }
 .cell {
    background: #1a1a1a;
  }
 .snake {
    background: #0f0;
    box-shadow: 0 0 5px #0f0;
    border-radius: 2px;
  }
 .food {
    background: #f00;
    box-shadow: 0 0 8px #f00;
    border-radius: 50%;
    animation: pulse 0.5s infinite alternate;
  }
  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
  }
  #controls {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 10px;
    margin-top: 20px;
    width: 200px;
    height: 200px;
  }
 .btn {
    background: #222;
    border: 2px solid #0f0;
    color: #0f0;
    font-size: 24px;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    user-select: none;
  }
 .btn:active {
    background: #0f0;
    color: #000;
  }
  #up { grid-area: 1 / 2; }
  #left { grid-area: 2 / 1; }
  #right { grid-area: 2 / 3; }
  #down { grid-area: 3 / 2; }
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.9);
    padding: 20px;
    border: 2px solid #0f0;
    text-align: center;
    display: none;
    z-index: 10;
  }
  #message button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #0f0;
    border: none;
    color: #000;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>
<body>
  <h1>🐍 SNAKE</h1>
  <div id="score">Score: 0</div>
  <div id="game-board"></div>
  <div id="controls">
    <div class="btn" id="up">▲</div>
    <div class="btn" id="left">◀</div>
    <div class="btn" id="right">▶</div>
    <div class="btn" id="down">▼</div>
  </div>
  <div id="message">
    <h2>Game Over!</h2>
    <p id="final-score"></p>
    <button onclick="location.reload()">Play Again</button>
  </div>

<script>
const board = document.getElementById('game-board');
const scoreEl = document.getElementById('score');
const messageEl = document.getElementById('message');
const finalScoreEl = document.getElementById('final-score');

const GRID_SIZE = 20;
let snake = [{x: 10, y: 10}];
let food = {x: 5, y: 5};
let dir = {x: 1, y: 0};
let score = 0;
let gameOver = false;

function draw() {
  board.innerHTML = '';
  for(let y = 0; y < GRID_SIZE; y++) {
    for(let x = 0; x < GRID_SIZE; x++) {
      const cell = document.createElement('div');
      cell.classList.add('cell');

      if(snake.some(s => s.x === x && s.y === y)) {
        cell.classList.add('snake');
      } else if(food.x === x && food.y === y) {
        cell.classList.add('food');
      }
      board.appendChild(cell);
    }
  }
}

function move() {
  if(gameOver) return;

  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wall collision
  if(head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
    endGame();
    return;
  }

  // Self collision
  if(snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame();
    return;
  }

  snake.unshift(head);

  // Eat food
  if(head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = `Score: ${score}`;
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function placeFood() {
  do {
    food = {
      x: Math.floor(Math.random() * GRID_SIZE),
      y: Math.floor(Math.random() * GRID_SIZE)
    };
  } while(snake.some(s => s.x === food.x && s.y === food.y));
}

function endGame() {
  gameOver = true;
  finalScoreEl.textContent = `Final Score: ${score}`;
  messageEl.style.display = 'block';
}

// Controls
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowUp' && dir.y!== 1) dir = {x: 0, y: -1};
  if(e.key === 'ArrowDown' && dir.y!== -1) dir = {x: 0, y: 1};
  if(e.key === 'ArrowLeft' && dir.x!== 1) dir = {x: -1, y: 0};
  if(e.key === 'ArrowRight' && dir.x!== -1) dir = {x: 1, y: 0};
});

document.getElementById('up').addEventListener('click', () => { if(dir.y!== 1) dir = {x: 0, y: -1}; });
document.getElementById('down').addEventListener('click', () => { if(dir.y!== -1) dir = {x: 0, y: 1}; });
document.getElementById('left').addEventListener('click', () => { if(dir.x!== 1) dir = {x: -1, y: 0}; });
document.getElementById('right').addEventListener('click', () => { if(dir.x!== -1) dir = {x: 1, y: 0}; });

// Start game
placeFood();
draw();
setInterval(move, 150);
</script>
</body>
  </html>
