<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abu Chat</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #0f0f0f; color: #fff; }
    #chatBox { max-width: 600px; margin: 0 auto; background: #1a1a1a; padding: 20px; border-radius: 12px; }
    #messages { height: 400px; overflow-y: auto; background: #222; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    .msg { margin: 8px 0; padding: 8px 12px; background: #333; border-radius: 6px; }
    .msg strong { color: #4ade80; }
    #inputRow { display: flex; gap: 8px; }
    #nameEl, #textEl { flex: 1; padding: 10px; border: none; border-radius: 6px; background: #2a2a2a; color: #fff; }
    #sendBtn { padding: 10px 20px; border: none; border-radius: 6px; background: #4ade80; color: #000; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div id="chatBox">
    <h2>🔥 Abu Fast Chat</h2>
    <div id="messages">Loading...</div>
    <div id="inputRow">
      <input id="nameEl" placeholder="Your name">
      <input id="textEl" placeholder="Type message...">
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAw9T3VjEDdC...", 
      authDomain: "abufastooth.firebaseapp.com",
      projectId: "abufastooth",
      storageBucket: "abufastooth.appspot.com",
      messagingSenderId: "487141933695",
      appId: "1:487141933695:web:0d9c563eb7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const msgsRef = collection(db, "messages");
    const q = query(msgsRef, orderBy("time", "asc"));

    const messagesEl = document.getElementById("messages");
    const nameEl = document.getElementById("nameEl");
    const textEl = document.getElementById("textEl");
    const sendBtn = document.getElementById("sendBtn");

    onSnapshot(q, snap => {
      messagesEl.innerHTML = '';
      snap.forEach(doc => {
        const m = doc.data();
        const div = document.createElement("div");
        div.className = 'msg';
        div.innerHTML = `<strong>${m.name}:</strong> ${m.text}`;
        messagesEl.appendChild(div);
      });
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });

    sendBtn.onclick = async () => {
      const name = nameEl.value.trim();
      const text = textEl.value.trim();
      if (!name || !text) return alert("Enter name + message");
      await addDoc(msgsRef, { name, text, time: serverTimestamp() });
      textEl.value = '';
    };
  </script>
</body>
</html>
