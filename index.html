<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AbuChat</title>
<style>
  body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background:#0b141a; color:#e9edef; }
  .chat { display:flex; flex-direction:column; height:100vh; max-width:600px; margin:0 auto; }
  header { background:#202c33; padding:12px 16px; font-weight:600; font-size:18px; }
  #messages { flex:1; overflow-y:auto; padding:16px; background:#0b141a; display:flex; flex-direction:column; gap:8px; }
  .msg { max-width:75%; padding:8px 12px; border-radius:8px; word-wrap:break-word; }
  .me { background:#005c4b; align-self:flex-end; border-top-right-radius:2px; }
  .other { background:#202c33; align-self:flex-start; border-top-left-radius:2px; }
  .name { font-size:12px; opacity:0.7; margin-bottom:2px; }
  footer { display:flex; background:#202c33; padding:8px; gap:8px; }
  input { flex:1; padding:12px; border:none; border-radius:20px; background:#2a3942; color:#e9edef; outline:none; }
  button { padding:12px 20px; border:none; border-radius:20px; background:#00a884; color:#fff; font-weight:600; cursor:pointer; }
</style>
</head>
<body>
<div class="chat">
  <header>AbuChat 🔥</header>
  <div id="messages"></div>
  <footer>
    <input id="name" placeholder="Your name">
    <input id="text" placeholder="Message">
    <button id="send">Send</button>
  </footer>
</div>
 

  

  
<script type="module">
 const firebaseConfig = {
   apiKey: "AIzaSyAw9T3VjEDdC...", 
 
   authDomain: "abufastooth.firebaseapp.com",
  projectId: "abufastooth",
   storageBucket: "abufastooth.appspot.com",
  messagingSenderId: "487141933695",
   appId: "1:487141933695:web:0d9c563eb7"
 };

  const messagesEl = document.getElementById('messages');
  const nameEl = document.getElementById('name');
  const textEl = document.getElementById('text');

  // 2. REAL-TIME CHAT
  onSnapshot(q, snap => {
    messagesEl.innerHTML = '';
    snap.forEach(doc => {
      const m = doc.data();
      const div = document.createElement('div');
      div.className = 'msg ' + (m.name === nameEl.value ? 'me' : 'other');
      div.innerHTML = `<div class="name">${m.name}</div>${m.text}`;
      messagesEl.appendChild(div);
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });

  // 3. SEND MESSAGE
  document.getElementById('send').onclick = async () => {
    if(!nameEl.value || !textEl.value) return alert("Enter name + message");
    await addDoc(msgsRef, { name: nameEl.value, text: textEl.value, time: serverTimestamp() });
    textEl.value = '';
  };
</script>
</body>
</html>
